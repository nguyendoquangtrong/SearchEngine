version: '3.9'

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: movie_chromadb
    ports:
      - "8000:8000"
    volumes:
      # Ánh xạ thư mục ChromaDB_Storage ở ngoài máy vào trong container
      - ./ChromaDB_Storage:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    restart: always